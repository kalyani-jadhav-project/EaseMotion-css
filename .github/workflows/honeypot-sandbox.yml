name: Honeypot Sandbox Registry

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  sandbox-relocate:
    name: Sandbox Relocate & Tag
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft != true &&
      contains(fromJSON('["xenon010101", "saidai-bhuvanesh", "tmdeveloper007", "desireddymohithreddy0925", "sanrishi", "sonusharma6-dsa"]'), github.event.pull_request.user.login)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Sandbox Relocation
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          node .github/scripts/sandbox-relocate.js
